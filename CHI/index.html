*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F1EB;
  --bg-card: #FFFDF9;
  --ink: #1A1714;
  --ink-soft: #6B6560;
  --ink-faint: #A9A29B;

  --accent-panel: #7B4B94;
  --accent-paper: #C4622D;
  --accent-social: #1B6B8A;
  --accent-organize: #B8860B;
  --conflict: #C0392B;
  --conflict-bg: #FDF0EE;
  --border: #E4DDD5;
  --border-active: #C8BFB4;
  --radius: 10px;

  --shadow-md: 0 4px 16px rgba(26,23,20,0.08);
  --shadow-lg: 0 8px 32px rgba(26,23,20,0.1);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 100px;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(246,241,235,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 0;
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}

.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 28px;
  letter-spacing: -0.5px;
  color: var(--ink);
}

.logo span {
  font-style: italic;
  color: var(--ink-soft);
  font-weight: 400;
}

.header-subtitle {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── DAY TABS ── */
.day-tabs {
  display: flex;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  margin: 0 -20px;
  padding: 0 20px;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  padding: 10px 14px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-faint);
  background: none;
  border: none;
  border-bottom: 2.5px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
  white-space: nowrap;
}

.day-tab:hover { color: var(--ink-soft); }

.day-tab.active {
  color: var(--ink);
  border-bottom-color: var(--ink);
}

.day-tab .tab-day {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.day-tab .tab-date {
  font-family: 'Instrument Serif', serif;
  font-size: 20px;
}

.day-tab .conflict-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--conflict);
  border-radius: 50%;
  margin-left: 4px;
  vertical-align: middle;
}

/* ── CONTENT ── */
.content { padding: 20px; }

.day-section { display: none; }
.day-section.active { display: block; }

.day-header {
  font-family: 'Instrument Serif', serif;
  font-size: 32px;
  margin-bottom: 4px;
  letter-spacing: -0.5px;
}

.day-date-full {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-faint);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
}

/* ── EVENT CARDS ── */
.event-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  position: relative;
  transition: all 0.2s;
  overflow: hidden;
}

.event-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  border-radius: var(--radius) 0 0 var(--radius);
}

.event-card[data-type="workshop"]::before { background: var(--accent-workshop); }
.event-card[data-type="panel"]::before { background: var(--accent-panel); }
.event-card[data-type="paper"]::before { background: var(--accent-paper); }
.event-card[data-type="social"]::before { background: var(--accent-social); }
.event-card[data-type="organize"]::before { background: var(--accent-organize); }

.event-card.conflict {
  border-color: var(--conflict);
  background: var(--conflict-bg);
}

.conflict-badge {
  display: none;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--conflict);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}

.conflict .conflict-badge { display: flex; }

.conflict-badge svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.event-time {

  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.event-type-tag {

  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 2px 7px;
  border-radius: 4px;
  color: white;

.event-card[data-type="workshop"] .event-type-tag { background: var(--accent-workshop); }
.event-card[data-type="panel"] .event-type-tag { background: var(--accent-panel); }
.event-card[data-type="paper"] .event-type-tag { background: var(--accent-paper); }
.event-card[data-type="social"] .event-type-tag { background: var(--accent-social); }

  color: var(--accent-social);
  text-decoration: none;
  font-weight: 500;

.event-link:hover { text-decoration: underline; }

/* ── DONE TOGGLE ── */
.done-toggle {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border-active);
  background: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;

.done-toggle svg {
  width: 14px;
  height: 14px;
  opacity: 0;
  transition: opacity 0.15s;
  stroke: white;
}

.event-card.done .done-toggle {
  background: var(--accent-workshop);
  border-color: var(--accent-workshop);
}

.event-card.done .done-toggle svg { opacity: 1; }

.event-card.done {
  opacity: 0.45;
}

.event-card.done .event-title {
  text-decoration: line-through;
  text-decoration-color: var(--ink-faint);
}

.unscheduled-section {
  margin-top: 28px;
  padding-top: 20px;
  border-top: 1px dashed var(--border-active);

  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-faint);
  margin-bottom: 12px;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  margin-top: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--ink-soft);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 3px;
}

/* ── TIME DIVIDERS ── */
.time-block-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink-faint);
  margin: 24px 0 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.time-block-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── NO EVENTS ── */
.empty-note {
  text-align: center;
  padding: 40px 20px;
  color: var(--ink-faint);
  font-style: italic;
}

/* ── ANIMATIONS ── */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.event-card {
  animation: slideUp 0.3s ease both;
}

.event-card:nth-child(2) { animation-delay: 0.03s; }
.event-card:nth-child(3) { animation-delay: 0.06s; }
.event-card:nth-child(4) { animation-delay: 0.09s; }
.event-card:nth-child(5) { animation-delay: 0.12s; }
.event-card:nth-child(6) { animation-delay: 0.15s; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 4px; }
</style>
</head>

function fmtTime(t) {

  return `${hh}:${String(m).padStart(2,'0')} ${ampm}`;
}

  if (h < 12) return 'morning';
  if (h < 14) return 'midday';
  if (h < 17) return 'afternoon';
  return 'evening';
}

    : `${fmtTime(e.time)} – ${fmtTime(e.endTime)}`;

  return `
    <div class="event-card ${isDone ? 'done' : ''} ${isConflict ? 'conflict' : ''}" data-type="${e.type}" data-id="${id}">
      <button class="done-toggle" onclick="toggleDone('${id}', this)" aria-label="Mark as done">${checkSVG}</button>
      <div class="conflict-badge">${conflictSVG} Scheduling conflict</div>
      <div class="event-time">
        <span class="event-type-tag">${e.type === 'organize' ? 'Organizing' : e.type}</span>
        ${timeStr} CEST
      </div>
      <div class="event-title">${e.title}</div>
      ${e.room || e.note ? `<div class="event-meta">${e.room ? `<span class="room">${e.room}</span>` : ''}${e.room && e.note ? ' · ' : ''}${e.note || ''}</div>` : ''}
    </div>`;
}

function renderUnscheduledCard(e) {
  const id = eventId(e);
  const isDone = doneState[id];
  return `
    <div class="event-card ${isDone ? 'done' : ''}" data-type="${e.type}" data-id="${id}">
      <button class="done-toggle" onclick="toggleDone('${id}', this)" aria-label="Mark as done">${checkSVG}</button>
      <div class="event-time"><span class="event-type-tag">${e.type}</span> No time assigned</div>
      <div class="event-title">${e.title}</div>
      ${e.note ? `<div class="event-note">${e.note}</div>` : ''}
      ${e.link ? `<a class="event-link" href="${e.link}" target="_blank" rel="noopener">▶ ${e.linkLabel || 'Link'}</a>` : ''}
    </div>`;
}

function toggleDone(id, btn) {
  doneState[id] = !doneState[id];
  saveDone();
  const card = btn.closest('.event-card');
  card.classList.toggle('done', doneState[id]);
}

// Build tabs
const tabsEl = document.getElementById('dayTabs');
DAYS.forEach((d, i) => {
  const hasConflict = conflictDays.has(d.key);
  tabsEl.innerHTML += `
    <button class="day-tab ${i === 0 ? 'active' : ''}" data-day="${d.key}" onclick="switchDay('${d.key}')">
      <span class="tab-day">${d.short}</span>
      <span class="tab-date">${d.date}${hasConflict ? '<span class="conflict-dot"></span>' : ''}</span>
    </button>`;
});

// Build content
const contentEl = document.getElementById('content');

DAYS.forEach((d, i) => {
  const dayEvents = EVENTS.filter(e => e.day === d.key).sort((a, b) => a.time.localeCompare(b.time));

  let html = `<div class="day-section ${i === 0 ? 'active' : ''}" data-day="${d.key}">`;
  html += `<div class="day-header">${d.short.replace(/.$/, d.short === 'Thu' ? 'rsday' : d.short === 'Tue' ? 'sday' : d.short === 'Wed' ? 'nesday' : d.short === 'Fri' ? 'day' : 'day')}</div>`;
  html += `<div class="day-date-full">${d.full}, 2026</div>`;

  if (dayEvents.length === 0) {
    html += `<div class="empty-note">No events scheduled</div>`;
  } else {
    let currentBlock = '';
    dayEvents.forEach((e, idx) => {
      const block = getTimeBlock(e.time);
      if (block !== currentBlock) {
        currentBlock = block;
        html += `<div class="time-block-label">${blockLabels[block]}</div>`;
      }
      html += renderCard(e, idx);
    });
  }

  html += '</div>';
  contentEl.innerHTML += html;
});

// Unscheduled section (show on all days = append to last day? No, add as separate)
let unschedHtml = `<div class="day-section" data-day="unscheduled">
  <div class="day-header">Unscheduled</div>
  <div class="day-date-full">No assigned time slot</div>`;
UNSCHEDULED.forEach(e => { unschedHtml += renderUnscheduledCard(e); });
unschedHtml += '</div>';
contentEl.innerHTML += unschedHtml;

// Add unscheduled tab
tabsEl.innerHTML += `
  <button class="day-tab" data-day="unscheduled" onclick="switchDay('unscheduled')">
    <span class="tab-day">Other</span>
    <span class="tab-date">—</span>
  </button>`;

function switchDay(key) {
  document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day === key));
  document.querySelectorAll('.day-section').forEach(s => s.classList.toggle('active', s.dataset.day === key));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Auto-select today's tab if applicable
const today = new Date().toISOString().slice(0, 10);
const matchDay = DAYS.find(d => d.key === today);
if (matchDay) switchDay(matchDay.key);
</script>

</body>
</html>
